name: CI

# Runs the test suites on every PR to main and on pushes to main, so branch
# protection can require a green test run before merging. (Image publishing is
# a separate, push-only workflow — see docker-publish.yml.)
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: App — install & test
        run: |
          npm ci
          npx svelte-kit sync   # generates .svelte-kit/tsconfig.json (which tsconfig extends)
          npm test

      - name: Worker — install & test
        run: |
          cd worker
          npm ci
          npm test
